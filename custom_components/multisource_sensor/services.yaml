refresh:
  name: Refresh composite sensors
  description: >-
    Relance la détection des capteurs composites (groupes) et le backfill des
    groupes dont la composition a changé. Utile quand auto_discovery est
    désactivé : la réconciliation ne se fait alors qu'au démarrage et via cette
    action.
  fields:
    force:
      name: Force
      description: >-
        Rejoue le backfill de tous les groupes, même si leur composition n'a pas
        changé.
      required: false
      default: false
      selector:
        boolean:

backfill_helper:
  name: Backfill helper statistics
  description: >-
    Reconstruit l'historique long terme (statistics) d'un helper « Combine the
    state of several sensors » de type min, max ou mean, à partir des
    statistiques horaires de ses membres. Chaque appel écrase et remplace
    l'historique existant du helper. Reconstruction approximée (voir README).
  fields:
    entity_id:
      name: Helper(s)
      description: Le ou les group sensors à reconstruire.
      required: true
      selector:
        entity:
          filter:
            - integration: group
              domain: sensor
          multiple: true
    days:
      name: Days
      description: Profondeur d'historique à reconstruire, en jours.
      required: false
      default: 3650
      selector:
        number:
          min: 1
          max: 3650
          unit_of_measurement: days
          mode: box
